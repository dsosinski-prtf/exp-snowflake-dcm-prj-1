name: Deploy Snowflake DCM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_CONNECTIONS_MYCONNECTION_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_MYCONNECTION_USER: "PLATFORM_DEPLOYER"
      SNOWFLAKE_CONNECTIONS_MYCONNECTION_AUTHENTICATOR: "SNOWFLAKE_JWT"
      SNOWFLAKE_CONNECTIONS_MYCONNECTION_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PLATFORM_DEPLOYER_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: snowflake
          environment-file: environment.yml
          auto-activate-base: false

      - uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          cli-version: "3.16.0"
          default-config-file-path: "config.toml"

      - name: Check versions
        shell: bash -l {0}
        run: |
          snow --version
          python --version
          conda list

      - name: Print config.toml
        run: cat ~/.snowflake/config.toml

      - name: Verify connection
        run: snow connection test

      - name: Plan deployment
        run: snow dcm plan --target PLATFORM --connection myconnection

      - name: Deploy
        run: snow dcm deploy --target PLATFORM --connection myconnection

      - name: Deploy platform users
        run: |
          for f in users/platform/*.sql; do
            [ -f "$f" ] || continue
            echo "Running $f"
            snow sql -f "$f" --connection myconnection
          done

      - name: Deploy deployer users
        shell: bash -l {0}
        run: |
          python users/deployers/generate_deployer_sql.py manifest.yml > /tmp/deployers.sql
          echo "--- Generated SQL ---"
          cat /tmp/deployers.sql
          echo "--- Executing ---"
          snow sql -f /tmp/deployers.sql --connection myconnection

      - name: Deploy developer users
        env:
          DEFAULT_USER_PASSWORD: ${{ secrets.DEFAULT_USER_PASSWORD }}
        run: |
          for f in users/developers/*.sql; do
            [ -f "$f" ] || continue
            echo "Running $f"
            sed "s/__DEFAULT_USER_PASSWORD__/$DEFAULT_USER_PASSWORD/g" "$f" > /tmp/user.sql
            snow sql -f /tmp/user.sql --connection myconnection
          done

      - name: Deploy ops users
        run: |
          for f in users/ops/*.sql; do
            [ -f "$f" ] || continue
            echo "Running $f"
            snow sql -f "$f" --connection myconnection
          done
